<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A.L.E.X.</title>

<style>
:root{
  --void: #0a0a10;
  --panel: #14141c;
  --line: #23232e;
  --ink: #e4e2ea;
  --dim: #63636f;
  --signal-idle: #3d6bb0;
  --signal-focus: #8b5cf6;
  --signal-edge: #c77418;
  --signal-alert: #8b1a26;
  --mono: ui-monospace, "Cascadia Code", "SF Mono", Consolas, "Liberation Mono", monospace;
  --sans: -apple-system, "Segoe UI", ui-sans-serif, system-ui, sans-serif;

  /* Orb mood colors — defaults (idle/calm) so it renders correctly even
     before the first animation frame; overwritten continuously by
     animateOrb() below for smooth mood + real playback-driven
     transitions. */
  --orb-hi: rgb(151, 197, 255);
  --orb-mid: rgb(61, 107, 176);
  --orb-dim: rgb(36, 82, 151);
  --orb-edge: rgb(16, 62, 131);
  --orb-rim: rgba(1, 47, 116, 0.9);
  --orb-glow-a: rgba(61, 107, 176, 0.35);
  --orb-glow-b: rgba(61, 107, 176, 0.12);
  --orb-scale: 1;
}

*{ box-sizing: border-box; }

html, body{
  margin: 0;
  height: 100%;
  background: var(--void);
  color: var(--ink);
  font-family: var(--sans);
  overflow-x: hidden;
}

body{
  min-height: 100vh;
  display: grid;
  grid-template-columns: 240px 1fr 360px;
  gap: 0;
}

@media (max-width: 900px){
  body{ grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
  .rail{ order: 2; flex-direction: row !important; flex-wrap: wrap; overflow-x: auto; }
  .stage{ order: 1; min-height: 50vh; }
  .chat{ order: 3; border-left: none !important; border-top: 1px solid var(--line); height: auto !important; }
}

/* ---------------- TELEMETRY RAIL ---------------- */
.rail{
  border-right: 1px solid var(--line);
  padding: 24px 18px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  height: 100vh;
  overflow-y: auto;
}

.rail-brand{
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--dim);
  text-transform: uppercase;
}
.rail-brand b{
  color: var(--ink);
  font-weight: 600;
}

.tele-group{
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.tele-label{
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
}

.tele-row{
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  font-family: var(--mono);
  font-size: 12px;
  padding-bottom: 7px;
  border-bottom: 1px solid var(--line);
}

.tele-row .val{
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  transition: color 0.3s ease;
}

.tele-row.on .val{ color: var(--signal-idle); }
.tele-row.warn .val{ color: var(--signal-alert); }
.tele-row.focus .val{ color: var(--signal-focus); }
.tele-row.edge .val{ color: var(--signal-edge); }

/* Real mic-confidence bar (from Silero's per-frame speech probability),
   styled thin/quiet rather than a prominent meter — status folded into
   the rail, not a separate flashy indicator. */
#micContainer{
  height: 3px;
  background: var(--line);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 2px;
}
#micLevel{
  height: 100%;
  width: 0%;
  background: var(--signal-idle);
  transition: width 0.08s linear, background 0.15s ease;
}

.rail-actions{
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.rail-btn{
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: transparent;
  color: var(--dim);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 8px 10px;
  cursor: pointer;
  text-align: left;
}
.rail-btn:hover{ color: var(--ink); border-color: var(--dim); }
.rail-btn.active{ color: var(--signal-idle); border-color: var(--signal-idle); }
.rail-btn:focus-visible{ outline: 2px solid var(--signal-focus); outline-offset: 1px; }

.rail-debug{
  margin-top: auto;
}
.rail-debug summary{
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  cursor: pointer;
}
#debugContent, #profileContent{
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--dim);
  max-height: 160px;
  overflow-y: auto;
  margin-top: 8px;
  line-height: 1.5;
}
#debugContent .msg{ border-bottom: 1px solid var(--line); padding: 4px 0; }

.rail-foot{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.08em;
}

/* ---------------- STAGE (ORB) ---------------- */
.stage{
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  min-height: 100vh;
}

.orb{
  width: min(38vh, 300px);
  height: min(38vh, 300px);
  border-radius: 50%;
  position: relative;
  background: radial-gradient(circle at 34% 32%,
    var(--orb-hi) 0%, var(--orb-mid) 45%, var(--orb-dim) 82%, var(--orb-edge) 100%);
  border: 1px solid var(--orb-rim);
  box-shadow:
    0 0 26px 2px var(--orb-glow-a),
    0 0 52px 10px var(--orb-glow-b);
  transform: scale(var(--orb-scale));
}

.mood-tag{
  position: absolute;
  bottom: 56px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
}
.mood-tag .name{
  display: block;
  margin-top: 6px;
  font-size: 15px;
  letter-spacing: 0.04em;
  color: var(--orb-mid);
  transition: color 0.6s ease;
}

/* ---------------- CHAT ---------------- */
.chat{
  border-left: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.chat-head{
  padding: 20px 22px 15px;
  border-bottom: 1px solid var(--line);
}
.chat-head .eyebrow{
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--dim);
}
.chat-head .title{
  margin-top: 6px;
  font-size: 15px;
  color: var(--ink);
}

.chat-body{
  flex: 1;
  overflow-y: auto;
  padding: 18px 22px;
  display: flex;
  flex-direction: column;
}

#latest{ margin-bottom: 14px; }

#history{ border-top: 1px solid var(--line); padding-top: 10px; }
#history summary{
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dim);
  cursor: pointer;
}
#historyContent{ display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }

.msg{
  max-width: 92%;
  font-size: 13.5px;
  line-height: 1.55;
  white-space: pre-wrap;
  margin-bottom: 10px;
}
.msg.bot{
  align-self: flex-start;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 10px 13px;
}
.msg.user{
  align-self: flex-end;
  color: var(--dim);
  padding: 10px 2px;
  text-align: right;
}

.chat-input{
  border-top: 1px solid var(--line);
  padding: 14px 22px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.chat-input textarea{
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 3px;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 13px;
  padding: 10px 12px;
  resize: none;
  height: 52px;
}
.chat-input textarea:focus-visible{
  outline: 2px solid var(--signal-focus);
  outline-offset: 1px;
}
.chat-input-row{ display: flex; gap: 8px; }
.chat-input button{
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 0 16px;
  cursor: pointer;
}
.chat-input button:hover{ border-color: var(--signal-focus); color: var(--signal-focus); }

@media (prefers-reduced-motion: reduce){
  #micLevel{ transition: none; }
}
</style>
</head>

<body>

  <div class="rail">
    <div class="rail-brand"><b>A.L.E.X.</b><br/>interface</div>

    <div class="tele-group">
      <div class="tele-label">Link</div>
      <div class="tele-row" id="teleSocket"><span>socket</span><span class="val" id="teleSocketVal">connecting</span></div>
    </div>

    <div class="tele-group">
      <div class="tele-label">Presence</div>
      <div class="tele-row" id="teleListen"><span>listening</span><span class="val" id="teleListenVal">off</span></div>
      <div class="tele-row" id="teleState"><span>state</span><span class="val" id="teleStateVal">off</span></div>
      <div id="micContainer"><div id="micLevel"></div></div>
    </div>

    <div class="tele-group">
      <div class="tele-label">Profile</div>
      <div id="profileContent">No profile loaded</div>
    </div>

    <div class="rail-actions">
      <button class="rail-btn" id="autoBtn" onclick="toggleAutoListen()">Auto Listen: Off</button>
      <button class="rail-btn" onclick="logoff()">Log Off</button>
    </div>

    <details class="rail-debug">
      <summary>Debug</summary>
      <div id="debugContent"></div>
    </details>

    <div class="rail-foot" id="clock"></div>
  </div>

  <div class="stage">
    <div class="orb" id="orb"></div>
    <div class="mood-tag">
      current disposition
      <span class="name" id="moodName">calm</span>
    </div>
  </div>

  <div class="chat">
    <div class="chat-head">
      <div class="eyebrow">Transcript</div>
      <div class="title">conversation</div>
    </div>

    <div class="chat-body">
      <div id="latest"></div>
      <details id="history">
        <summary>Previous Messages</summary>
        <div id="historyContent"></div>
      </details>
    </div>

    <div class="chat-input">
      <textarea id="input" placeholder="Say something, or type it instead…"></textarea>
      <div class="chat-input-row">
        <button onclick="send()">Send</button>
      </div>
    </div>
  </div>

<!-- 2026-07-16/17: Silero VAD (via the @ricky0123/vad-web wrapper), vendored
     locally under static/vad/ — no CDN, same self-contained convention as
     everything else this project serves. ort.wasm.min.js must load before
     vad-bundle.min.js — the latter's UMD wrapper expects window.ort to
     already exist. -->
<script src="/static/vad/ort.wasm.min.js"></script>
<script src="/static/vad/vad-bundle.min.js"></script>

<script>
// numThreads=1 deliberately — the alternative (real multi-threaded WASM)
// needs SharedArrayBuffer, which needs Cross-Origin-Opener-Policy/
// Cross-Origin-Embedder-Policy response headers the server doesn't send
// today. A single small VAD model running one frame at a time doesn't
// need the throughput multi-threading buys anyway. wasmPaths points at
// the vendored files above, not a CDN.
if(window.ort){
    ort.env.wasm.numThreads = 1;
    ort.env.wasm.wasmPaths = "/static/vad/";
}

const ws = new WebSocket(`wss://${location.hostname}:5000/ws`);
ws.binaryType = "arraybuffer";

const latest = document.getElementById("latest");
const historyContent = document.getElementById("historyContent");
const profileContent = document.getElementById("profileContent");
const teleSocket = document.getElementById("teleSocket");
const teleSocketVal = document.getElementById("teleSocketVal");
const teleListen = document.getElementById("teleListen");
const teleListenVal = document.getElementById("teleListenVal");
const teleState = document.getElementById("teleState");
const teleStateVal = document.getElementById("teleStateVal");
const autoBtn = document.getElementById("autoBtn");
const micLevel = document.getElementById("micLevel");
const moodNameEl = document.getElementById("moodName");

// 2026-07-17 (Craig: "if I say alex and she starts listening there's no
// real way for me to know until she responds or not") — this is the gap
// between "an utterance was sent to the server" and "she actually
// replied", which previously had zero visual feedback. States: off (mic
// not armed) -> idle (armed, no speech yet) -> hearing you (Silero
// detected speech) -> thinking (utterance sent, awaiting a reply) ->
// speaking (a response is streaming/playing). A "thinking" state that
// outlives RESPONSE_TIMEOUT_MS means she heard it but the server silently
// dropped it (e.g. the wake-word/addressed-window gate in
// ws/ws_handlers.py) rather than still working on it — reverting to
// "idle" surfaces that instead of hanging forever with no signal either way.
const RESPONSE_TIMEOUT_MS = 12000;
let responseTimeoutHandle = null;

function setListenState(state){
    teleStateVal.textContent = state;
    teleState.classList.remove("on", "warn", "focus", "edge");
    if(state === "idle" || state === "speaking") teleState.classList.add("on");
    else if(state === "hearing you") teleState.classList.add("edge");
    else if(state === "thinking") teleState.classList.add("focus");
}

function armResponseTimeout(){
    if(responseTimeoutHandle) clearTimeout(responseTimeoutHandle);
    responseTimeoutHandle = setTimeout(() => {
        if(listening) setListenState("idle");
        responseTimeoutHandle = null;
    }, RESPONSE_TIMEOUT_MS);
}

function clearResponseTimeout(){
    if(responseTimeoutHandle){
        clearTimeout(responseTimeoutHandle);
        responseTimeoutHandle = null;
    }
}

/* ✅ DEBUG HELPER */
const debugContent = document.getElementById("debugContent");

function logDebug(message){
    if(!debugContent) return;

    const div = document.createElement("div");
    div.className = "msg";
    div.textContent = message;
    debugContent.prepend(div);
}

let currentMsg = "";
let currentDiv = null;

// 2026-07-16: speech playback moved from the server's own speakers into
// the browser (Web Audio API), so text and speech can actually be synced
// — see ws.onmessage's ArrayBuffer branch and scheduleAudioChunk() below.
let playCtx = null;
let playAnalyser = null;
let nextStartTime = 0;
let pendingTexts = [];      // text chunks buffered until their paired audio actually starts playing
let activeSources = [];     // currently scheduled/playing AudioBufferSourceNodes, so barge-in can stop them
let clientInterrupted = false;
let pendingRevealTimeouts = []; // setTimeout handles for not-yet-fired text reveals — see scheduleAudioChunk()

function getPlayCtx(){
    if(!playCtx){
        playCtx = new (window.AudioContext || window.webkitAudioContext)();
        nextStartTime = playCtx.currentTime;

        // Same AnalyserNode → level pattern already proven for the mic's
        // volume meter — the orb's pulse (animateOrb() below) reads real
        // played audio instead of a level the server used to compute and
        // send as a separate __AUDIO__ text message.
        playAnalyser = playCtx.createAnalyser();
        playAnalyser.connect(playCtx.destination);
    }
    return playCtx;
}

function pcmInt16ToAudioBuffer(ctx, arrayBuffer, sampleRate){
    const int16 = new Int16Array(arrayBuffer);
    const float32 = new Float32Array(int16.length);
    for(let i=0;i<int16.length;i++){ float32[i] = int16[i] / 32768; }
    const buffer = ctx.createBuffer(1, float32.length, sampleRate);
    buffer.copyToChannel(float32, 0);
    return buffer;
}

function scheduleAudioChunk(arrayBuffer){
    if(clientInterrupted) return;

    const ctx = getPlayCtx();
    // Piper's --output-raw convention (speech/tts_engine.py's SAMPLE_RATE):
    // 16-bit signed PCM, mono, 22050 Hz.
    const buffer = pcmInt16ToAudioBuffer(ctx, arrayBuffer, 22050);

    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(playAnalyser);

    // Gapless scheduling: each clip starts exactly when the previous one
    // ends, not just whenever it happens to arrive over the network.
    const startAt = Math.max(nextStartTime, ctx.currentTime);
    source.start(startAt);
    nextStartTime = startAt + buffer.duration;

    activeSources.push(source);
    source.onended = () => { activeSources = activeSources.filter(s => s !== source); };

    // Reveal this clip's paired text at the moment it actually starts
    // playing, not when it arrived over the wire.
    //
    // 2026-07-17 (Craig: "all the spoken words are not appearing as
    // text") — root cause: the server streams text+audio as fast as it
    // generates, far faster than the audio actually takes to play back,
    // so later clauses get scheduled with a real delay here (their
    // startAt is seconds in the future). __END__ arrives almost
    // immediately after the LAST clause is sent — long before these
    // later setTimeouts fire — and used to null the global `currentDiv`
    // right then. By the time a deferred reveal finally ran,
    // appendBotText() read a `currentDiv` that was already null and
    // silently did nothing. Only the very first clause (near-zero delay)
    // reliably beat __END__, which is exactly why short, single-clause
    // replies looked fine and longer ones lost everything after the
    // first sentence. Fix: snapshot the div synchronously, right now,
    // instead of reading the mutable global later.
    const text = pendingTexts.shift();
    const targetDiv = currentDiv;
    if(text !== undefined && targetDiv){
        const delayMs = Math.max(0, (startAt - ctx.currentTime) * 1000);
        const handle = setTimeout(() => {
            currentMsg += text;
            targetDiv.textContent = currentMsg;
            pendingRevealTimeouts = pendingRevealTimeouts.filter(h => h !== handle);
        }, delayMs);
        pendingRevealTimeouts.push(handle);
    }
}

function stopAllPlayback(){
    clientInterrupted = true;
    for(const s of activeSources){ try{ s.stop(); }catch(e){} }
    activeSources = [];
    pendingTexts = [];
    // Also cancel any not-yet-fired deferred text reveals from whatever
    // response was previously playing — without this, one could still
    // fire after a NEW response's __START__ already reset currentMsg,
    // corrupting it with leftover text from the interrupted/previous turn.
    for(const h of pendingRevealTimeouts){ clearTimeout(h); }
    pendingRevealTimeouts = [];
    if(playCtx){ nextStartTime = playCtx.currentTime; }
}

let listening = false;
let stream, recorder;
let chunks = [];
let ignoreUntil = 0;
let stopping = false;
// 2026-07-17 (Craig, real example: "override code X, you can be more
// sassy" got cut after "override code X" — the actual request was lost):
// a genuine mid-thought pause (very plausible right after stating a
// precise thing like a code, before continuing to the actual point) was
// almost certainly being misread as "done talking." This is a client-
// side VAD with no real understanding of whether a thought is actually
// finished — it can't semantically know "this sounds incomplete," so
// the honest, buildable fix is just more pause tolerance, not a true
// "wait if it sounds cut off" (that would need real-time transcript
// understanding, not just volume). Both raised — SILENCE_MS was the more
// likely culprit for this specific story, MAX_UTTERANCE_MS raised too
// since a code-plus-instruction sentence can genuinely run long.
const SILENCE_MS = 1400; // was 800
const MIN_SPEECH_MS = 450;
const MAX_UTTERANCE_MS = 9000; // was 6500

ws.onopen = () => {
    teleSocketVal.textContent = "connected";
    teleSocket.classList.add("on");
    teleSocket.classList.remove("warn");

    let savedUser = localStorage.getItem("alex_user");

    // 🔥 SANITIZE STORED USER
    if(savedUser){
        savedUser = savedUser.trim().toLowerCase();

        const invalid = ["", "undefined", "null", "none"];

        if(!invalid.includes(savedUser) && savedUser.length > 1){
            console.log("👤 Restoring user:", savedUser);

            logDebug(`Restoring user: ${savedUser}`);

            ws.send(JSON.stringify({
                user_name: savedUser
            }));
        } else {
            console.log("⚠️ Invalid stored user, clearing");
            logDebug("Invalid stored user, clearing");
            localStorage.removeItem("alex_user");
        }
    }
};

ws.onclose = () => {
    teleSocketVal.textContent = "disconnected";
    teleSocket.classList.remove("on");
    teleSocket.classList.add("warn");
};

ws.onmessage = (e)=>{

    const data = e.data;

    // 2026-07-16: speech now plays through the browser (Web Audio API)
    // instead of the server's own speakers, so her voice arrives as
    // binary PCM frames over this same connection — must be checked
    // FIRST, before any string method call below (ArrayBuffer has no
    // .startsWith()).
    if(data instanceof ArrayBuffer){
        scheduleAudioChunk(data);
        return;
    }

    if(data.startsWith("__DEBUG__")){
        logDebug(data.replace("__DEBUG__", ""));
        return;
    }

    if(typeof data === "string" && data.startsWith("__PROFILE__")){
        const json = JSON.parse(data.replace("__PROFILE__", ""));
        let html = "";

        if(json.role){
            const role = json.role.toUpperCase();
            html += `<div style="color:var(--ink); margin-bottom:4px;">role: ${role}</div>`;
        }

        for(const k in json){
            if(k === "role") continue;
            html += `<div>${k.replaceAll("_"," ")}: ${json[k]}</div>`;
        }

        profileContent.innerHTML = html || "No profile loaded";

        if(json.user_name){
            localStorage.setItem("alex_user", json.user_name);
        }

        return;
    }

    // 2026-07-17: real mood signal from core/response_handler.py's
    // derive_mood() — sent right after __PROFILE__, before __END__.
    // Drives the orb's TARGET color; animateOrb() below eases toward it
    // smoothly rather than snapping.
    if(typeof data === "string" && data.startsWith("__MOOD__")){
        setMoodTarget(data.replace("__MOOD__", ""));
        armIdleMoodReset();
        return;
    }

    if(data === "__START__"){
        currentMsg = "";

        if(latest.firstChild){
            historyContent.prepend(latest.firstChild);
        }

        currentDiv = document.createElement("div");
        currentDiv.className = "msg bot";
        latest.innerHTML = "";
        latest.appendChild(currentDiv);

        // Reset per-response playback/sync state — mirrors the server's
        // own session["interrupted"] = False reset at the start of every
        // new response (core/response_handler.py). Also stops whatever
        // audio the PREVIOUS response still had scheduled — found live
        // (2026-07-16) that skipping this let two responses' audio
        // overlap if a new one started before the last one finished.
        stopAllPlayback();
        clientInterrupted = false;

        clearResponseTimeout();
        setListenState("speaking");

        return;
    }

    if(data === "__END__"){
        // Safety net: reveal any text still waiting on audio that never
        // arrived (e.g. synthesis failed for that clause) so it's never
        // silently lost — everything else already got revealed in sync
        // with its audio via scheduleAudioChunk() below.
        while(pendingTexts.length){
            appendBotText(pendingTexts.shift());
        }
        currentDiv = null;
        if(listening) setListenState("idle");
        return;
    }

    if(typeof data === "string"){

        // Fallback for text sent outside a __START__/__END__ envelope
        // (e.g. identity/identity_manager.py's voice-enrollment/
        // verification prompts). Sets currentDiv/currentMsg for real —
        // previously left both untouched, so a second stray fragment hit
        // this same branch again and wiped the first instead of
        // appending to it.
        if(!currentDiv){
            currentDiv = document.createElement("div");
            currentDiv.className = "msg bot";

            if(latest.firstChild){
                historyContent.prepend(latest.firstChild);
            }

            currentMsg = data;
            currentDiv.textContent = currentMsg;
            latest.innerHTML = "";
            latest.appendChild(currentDiv);
            return;
        }

        // Buffered, not shown immediately — core/response_handler.py now
        // sends this clause's text right before its synthesized audio;
        // scheduleAudioChunk() reveals it the instant that audio actually
        // starts playing, so text and speech stay in sync instead of text
        // racing ahead of her voice.
        pendingTexts.push(data);
    }
};

function appendBotText(text){
    currentMsg += text;
    if(currentDiv){ currentDiv.textContent = currentMsg; }
}

function send() {
    const input = document.getElementById("input");

    if (!input) return;

    const text = input.value.trim();
    if (!text) return;

    console.log("📤 Sending:", text);

    ws.send(text);

    // show user message in chat
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = text;

    if (latest.firstChild) {
        historyContent.prepend(latest.firstChild);
    }

    latest.innerHTML = "";
    latest.appendChild(div);

    input.value = "";
}

document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

function createRecorder(){

    recorder = new MediaRecorder(stream);
    chunks = [];

    recorder.ondataavailable = e=>{
        if(e.data && e.data.size > 0){
            chunks.push(e.data);
        }
    };

    recorder.onstop = async ()=>{
        stopping = false;

        if(!chunks.length){
            restartRecorder();
            return;
        }

        const blob = new Blob(chunks,{type:"audio/webm"});
        chunks = [];

        if(blob.size < 2000){
            ignoreUntil = Date.now() + 800;
            if(listening) setListenState("idle");
            restartRecorder();
            return;
        }

        if(ws.readyState !== 1){
            return;
        }

        const buf = await blob.arrayBuffer();
        ws.send(buf);
        ws.send("__END_AUDIO__");

        setListenState("thinking");
        armResponseTimeout();

        ignoreUntil = Date.now() + 1000;

        restartRecorder();
    };
}

function restartRecorder(){
    if(!listening) return;

    setTimeout(()=>{
        createRecorder();
        recorder.start(250);
    },150);
}

async function startListening(){
    stream = await navigator.mediaDevices.getUserMedia({audio:true});

    // 2026-07-16: found live — "the first 2 things it said were not
    // spoken." Browsers only allow an AudioContext to actually produce
    // sound after a real user gesture unlocks it; getPlayCtx() used to
    // only get created lazily on the first incoming audio frame, which
    // isn't a user gesture and can leave it stuck "suspended" — silently
    // dropping audio until something else happened to unlock it later.
    // This click already is a real gesture (it's what getUserMedia just
    // used), so creating/resuming the playback context here piggybacks
    // on it instead of hoping a later interaction unlocks it by accident.
    const ctx = getPlayCtx();
    if(ctx.state === "suspended"){
        ctx.resume();
    }

    createRecorder();
    recorder.start(250);

    listening = true;
    teleListenVal.textContent = "continuous";
    teleListen.classList.add("on");
    setListenState("idle");
    detect(stream);
}

function stopListening(){
    listening=false;
    teleListenVal.textContent = "off";
    teleListen.classList.remove("on");
    clearResponseTimeout();
    setListenState("off");
    try{ recorder.stop(); }catch{}
    // micVad now persists across listen/stop cycles (real VAD models want
    // to keep their internal state warm) instead of being torn down and
    // rebuilt every time — pause() instead of destroy() so toggling auto-
    // listen back on later just calls start() again in detect() above.
    if(micVad){ try{ micVad.pause(); }catch{} }
    if(stream) stream.getTracks().forEach(t=>t.stop());
}

function toggleAutoListen(){
    if(listening){
        stopListening();
        autoBtn.textContent = "Auto Listen: Off";
        autoBtn.classList.remove("active");
    } else {
        startListening();
        autoBtn.textContent = "Auto Listen: On";
        autoBtn.classList.add("active");
    }
}

// 2026-07-17: Silero VAD (a small neural speech-detection model, via the
// vendored @ricky0123/vad-web wrapper — see the <script> tags above and
// static/vad/) replaces the old raw-volume threshold/timer heuristic.
// SILENCE_MS/MIN_SPEECH_MS keep their tuned values, now driving Silero's
// redemptionMs/minSpeechMs instead of a manual timer. MAX_UTTERANCE_MS
// has no direct equivalent in vad-web's own options, so it's kept as a
// manual fallback timer below — a defensive cap in case the model somehow
// never calls onSpeechEnd, not the primary decision anymore.
//
// This now runs continuously once created (matching how a real VAD model
// wants to keep its internal state warm) rather than being torn down and
// recreated on every listen/stop cycle — start()/pause() are used
// instead of building a new instance each time.
let micVad = null;
let utteranceStart = 0;

async function detect(stream){

    if(!micVad){
        micVad = await vad.MicVAD.new({
            model: "v5",
            baseAssetPath: "/static/vad/",
            onnxWASMBasePath: "/static/vad/",

            // Reuse the SAME getUserMedia stream startListening() already
            // obtained (and that the MediaRecorder is already capturing
            // from) — no second mic request, no second permission prompt.
            getStream: () => Promise.resolve(stream),
            pauseStream: async () => {},
            resumeStream: async () => stream,

            startOnLoad: false,
            redemptionMs: SILENCE_MS,
            minSpeechMs: MIN_SPEECH_MS,

            onFrameProcessed: (probabilities) => {
                const percent = Math.min(100, probabilities.isSpeech * 100);
                micLevel.style.width = percent + "%";
                micLevel.style.background = probabilities.isSpeech > 0.5 ? "var(--signal-idle)" : "var(--line)";
            },

            onSpeechStart: () => {
                if(Date.now() < ignoreUntil) return;

                utteranceStart = Date.now();
                setListenState("hearing you");

                // 🎙️ Barge-in: same instant reaction as the old volume
                // trigger, deliberately not waiting for onSpeechRealStart
                // (which waits out the misfire-filter window) — barge-in
                // needs to feel instant. A misfire here just means her
                // playback got cut on a false alarm, the same risk the
                // old threshold-based trigger already carried.
                stopAllPlayback();
                if(ws && ws.readyState === 1){
                    ws.send("__INTERRUPT__");
                }
            },

            onSpeechEnd: () => {
                if(!stopping){
                    stopping = true;
                    try{
                        recorder.requestData();
                        recorder.stop();
                    }catch{
                        stopping = false;
                    }
                }
            },

            // Speech-start fired but the segment was too short to count
            // as real speech (below minSpeechMs) — onSpeechEnd will NOT
            // fire for it, so the "hearing you" state set above would
            // otherwise be stuck until the next real utterance.
            onVADMisfire: () => { if(listening) setListenState("idle"); },
        });

        // Defensive fallback only — Silero's own onSpeechEnd is the
        // primary stop trigger now. This just guards against the model
        // somehow never firing it for an abnormally long stretch.
        setInterval(() => {
            if(!listening || !utteranceStart || stopping) return;
            if(Date.now() - utteranceStart > MAX_UTTERANCE_MS){
                stopping = true;
                try{
                    recorder.requestData();
                    recorder.stop();
                }catch{
                    stopping = false;
                }
                utteranceStart = 0;
            }
        }, 250);
    }

    if(listening){
        micVad.start();
    }
}

// ---------------- ORB: mood color + real audio-reactive pulse ----------------
// 2026-07-17: the orb used to be a <canvas> redrawn every frame; now a
// plain div driven by CSS custom properties (see interface concept
// review — canvas resolution/scaling was a real, repeated source of
// visible blur that a fixed-size bitmap couldn't reliably avoid). Two
// independent signals combine here every frame:
//  - MOOD (color): set by __MOOD__ messages from core/response_handler.py
//    (core/mood.py's derive_mood()) — updates once per turn, eased in
//    smoothly rather than snapping.
//  - SPEECH (pulse): real, continuous — read directly from playAnalyser,
//    i.e. audio actually playing right now, same as the previous canvas
//    version's speechPulse. Not a canned animation; she only pulses
//    harder when she's actually talking.
const orbEl = document.getElementById("orb");

const MOOD_COLORS = {
    calm:    [61, 107, 176],
    focused: [139, 92, 246],
    edge:    [199, 116, 24],
    alert:   [139, 26, 38],
};

let displayColor = MOOD_COLORS.calm.slice();
let targetColor = MOOD_COLORS.calm.slice();

function setMoodTarget(key){
    const c = MOOD_COLORS[key] || MOOD_COLORS.calm;
    targetColor = c.slice();
    if(moodNameEl){ moodNameEl.textContent = key; }
}

// 2026-07-17 (Craig: "when idle the orb is showing as focused... unless
// she's doing something in the background I can't see") — derive_mood()
// tags each response from its own content (a real, intentional design —
// see core/mood.py), but nothing ever reset the orb back afterward, so
// whatever her LAST reply happened to be tagged (e.g. "focused" for a
// long answer or one with a question in it) just stayed showing forever,
// looking like an ongoing state rather than a one-off read on that reply.
// Re-armed on every real __MOOD__ message; if none arrives for a while
// (she's actually not doing anything), eases back to the true resting
// state instead of freezing on old, stale emotional color.
const IDLE_MOOD_RESET_MS = 20000;
let idleMoodResetHandle = null;

function armIdleMoodReset(){
    if(idleMoodResetHandle) clearTimeout(idleMoodResetHandle);
    idleMoodResetHandle = setTimeout(() => {
        setMoodTarget("calm");
        idleMoodResetHandle = null;
    }, IDLE_MOOD_RESET_MS);
}

const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

let audioLevel = 0;    // computed each frame from playAnalyser — real played audio
let displayLevel = 0;  // eased toward audioLevel so the pulse doesn't jitter frame to frame
let idlePhase = 0;     // slow drift so the orb still feels alive when silent
let playLevelData = null;

function animateOrb(){
    if(playAnalyser){
        if(!playLevelData){ playLevelData = new Uint8Array(playAnalyser.fftSize); }
        playAnalyser.getByteTimeDomainData(playLevelData);

        let vol = 0;
        for(let i=0;i<playLevelData.length;i++){ vol += Math.abs(playLevelData[i]-128); }
        vol /= playLevelData.length;

        // Starting-point scaling, not yet tuned against real playback —
        // TTS output is a clean, consistently-leveled signal unlike the
        // noisy mic.
        audioLevel = Math.min(1, vol / 40);

        // Anti-feedback guard, carried over unchanged: her own voice can
        // bleed into the mic through the speakers, so while she's audibly
        // playing, keep pushing the mic's ignore-window forward.
        if(audioLevel > 0.01){
            ignoreUntil = Date.now() + 500;
        }
    }

    displayLevel += (audioLevel - displayLevel) * 0.25;

    for(let i=0;i<3;i++){
        displayColor[i] += (targetColor[i] - displayColor[i]) * 0.04;
    }
    const [r, g, b] = displayColor.map(Math.round);

    const hi = `rgb(${Math.min(255,r+90)}, ${Math.min(255,g+90)}, ${Math.min(255,b+90)})`;
    const mid = `rgb(${r}, ${g}, ${b})`;
    const dim = `rgb(${Math.max(0,r-25)}, ${Math.max(0,g-25)}, ${Math.max(0,b-25)})`;
    const edge = `rgb(${Math.max(0,r-45)}, ${Math.max(0,g-45)}, ${Math.max(0,b-45)})`;
    const rim = `rgba(${Math.max(0,r-60)}, ${Math.max(0,g-60)}, ${Math.max(0,b-60)}, 0.9)`;
    const glowA = `rgba(${r}, ${g}, ${b}, ${(0.35 + displayLevel * 0.35).toFixed(3)})`;
    const glowB = `rgba(${r}, ${g}, ${b}, ${(0.12 + displayLevel * 0.15).toFixed(3)})`;

    orbEl.style.setProperty("--orb-hi", hi);
    orbEl.style.setProperty("--orb-mid", mid);
    orbEl.style.setProperty("--orb-dim", dim);
    orbEl.style.setProperty("--orb-edge", edge);
    orbEl.style.setProperty("--orb-rim", rim);
    orbEl.style.setProperty("--orb-glow-a", glowA);
    orbEl.style.setProperty("--orb-glow-b", glowB);

    // Idle breathing + real speech pulse combined into one scale factor —
    // same combination the old canvas version used (idlePulse +
    // speechPulse on the radius), just expressed as a CSS transform
    // instead of a redrawn arc.
    if(reduceMotion){
        orbEl.style.setProperty("--orb-scale", (1 + displayLevel * 0.06).toFixed(4));
    } else {
        idlePhase += 0.02;
        const idlePulse = Math.sin(idlePhase) * 0.015;
        const speechPulse = displayLevel * 0.1;
        orbEl.style.setProperty("--orb-scale", (1 + idlePulse + speechPulse).toFixed(4));
    }

    requestAnimationFrame(animateOrb);
}

animateOrb();

// Real clock, not decoration — genuinely useful in a rail with no other
// timestamp visible.
const clockEl = document.getElementById("clock");
function tick(){
    clockEl.textContent = new Date().toLocaleTimeString("en-US", { hour12: false });
}
setInterval(tick, 1000);
tick();

// 2026-07-17 (Craig: "she did not auto listen on join" — matches the
// earlier design decision to default to listening automatically rather
// than requiring a manual click every time, keeping the rail button as
// the explicit way to turn it off when actually wanted). This was
// designed but never actually wired up — startListening() was only ever
// called from toggleAutoListen()'s click handler. Browsers require a
// real user gesture for the FIRST-ever mic permission grant on an
// origin — this can't bypass that on a genuinely fresh browser profile
// — but once granted (already true here from tonight's testing),
// getUserMedia() below just works with no fresh prompt.
startListening().then(() => {
    autoBtn.textContent = "Auto Listen: On";
    autoBtn.classList.add("active");
}).catch(err => {
    console.warn("Auto-start listening failed (mic permission likely needed):", err);
    logDebug("Auto-listen didn't start automatically — click Auto Listen to grant mic access.");
});

function logoff(){

    console.log("🚪 Logging off...");

    // 🔴 stop listening (mic)
    stopListening();

    // 🔴 close websocket
    if(ws && ws.readyState === 1){
        ws.close();
    }

    // 🔴 clear stored identity
    localStorage.removeItem("alex_user");

    // 🔴 reset UI
    latest.innerHTML = "";
    historyContent.innerHTML = "";
    profileContent.innerHTML = "No profile loaded";

    // 🔴 reconnect fresh after short delay
    setTimeout(()=>{
        location.reload();
    }, 300);
}

</script>

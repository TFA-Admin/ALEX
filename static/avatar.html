<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A.L.E.X Avatar</title>

<style>
body {
  background:#1e1e1e;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:60px 20px 20px 20px;
  display:flex;
  justify-content:center;
}

#main {
  display:flex;
  gap:20px;
  align-items:flex-start;
  max-width:1000px;
  width:100%;
  padding-right: 100px;
  padding-top: 20px;
}

#header {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  font-weight:bold;
}

#leftPanel {
  display:flex;
  flex-direction:column;
  align-items:center;
}

#rightPanel {
  display:flex;
  flex-direction:column;
}

#chatContainer {
  width:400px;
  height:500px;
  border:1px solid #555;
  background:#111;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

#debugPanel {
  display:flex;
  flex-direction:column;
}

#debugBox {
  width:300px;
  height:500px;
  border:1px solid #555;
  background:#111;
  overflow-y:auto;
  padding:10px;
  font-size:12px;
}

#latest { margin-bottom:10px; }

#history {
  border-top:1px solid #444;
  padding-top:5px;
}

canvas {
  background:#222;
  border:1px solid #555;
  margin-bottom:10px;
}

#leds {
  display:flex;
  gap:10px;
  margin:10px;
}

.led {
  width:15px;
  height:15px;
  border-radius:50%;
  background:#555;
}

/* ✅ MIC BAR */
#micContainer {
  width:300px;
  height:10px;
  background:#333;
  border:1px solid #555;
  margin-top:5px;
}

#micLevel {
  height:100%;
  width:0%;
  background:#777;
  transition:width 0.05s linear;
}

textarea {
  width:400px;
  height:60px;
  background:#333;
  color:#fff;
  border:1px solid #555;
  padding:5px;
}

button {
  margin-top:5px;
  padding:6px 12px;
}

.msg {
  padding:6px;
  margin:3px;
  border-radius:5px;
  white-space: pre-wrap;
}

.user { background:#444; align-self:flex-end; }
.bot { background:#222; align-self:flex-start; }

#profileBox {
  margin-top:10px;
  padding:10px;
  background:#222;
  width:300px;
  border:1px solid #555;
}
</style>
</head>

<body>

<div id="header">A.L.E.X.</div>

<div id="main">

  <!-- ✅ DEBUG COLUMN -->
  <div id="debugPanel">
    <div id="debugBox">
      <b>Debug</b>
      <div id="debugContent"></div>
    </div>
  </div>

  <!-- ✅ CENTER PANEL -->
  <div id="leftPanel">

    <canvas id="avatarCanvas" width="300" height="300"></canvas>

    <div id="profileBox">
        <b>Profile</b>
        <div id="profileContent">No profile loaded</div>
    </div>

    <div id="leds">
        <div id="wsLed" class="led"></div>
        <div id="activityLed" class="led"></div>
        <div id="autoLed" class="led"></div>
    </div>

    <div id="micContainer">
        <div id="micLevel"></div>
    </div>

    <textarea id="input" placeholder="Type..."></textarea>
    <button onclick="send()">Send</button>

    <button id="autoBtn" onclick="toggleAutoListen()">🎧 Auto Listen OFF</button>
    <button onclick="logoff()">🚪 Log Off</button>

  </div>
    <!-- ✅ RIGHT PANEL -->
  <div id="rightPanel">

    <div id="chatContainer">
      <div id="latest"></div>

      <details id="history">
        <summary>Previous Messages</summary>
        <div id="historyContent"></div>
      </details>
    </div>

  </div>

</div>

<script>
const ws = new WebSocket(`wss://${location.hostname}:5000/ws`);
ws.binaryType = "arraybuffer";

const latest = document.getElementById("latest");
const historyContent = document.getElementById("historyContent");
const profileContent = document.getElementById("profileContent");
const wsLed = document.getElementById("wsLed");
const activityLed = document.getElementById("activityLed");
const autoLed = document.getElementById("autoLed");
const autoBtn = document.getElementById("autoBtn");
const micLevel = document.getElementById("micLevel");

/* ✅ DEBUG HELPER */
const debugContent = document.getElementById("debugContent");

function logDebug(message){
    if(!debugContent) return;

    const div = document.createElement("div");
    div.className = "msg bot";
    div.textContent = message;
    debugContent.prepend(div);
}

let currentMsg = "";
let currentDiv = null;

let listening = false;
let stream, recorder;
let chunks = [];
let ignoreUntil = 0;
let stopping = false;
const SPEECH_THRESHOLD = 3; // lowered from 6 — was requiring loud/clear speech to trigger recording at all
const SILENCE_MS = 800;
const MIN_SPEECH_MS = 450;
const MAX_UTTERANCE_MS = 6500;

ws.onopen = () => {
    wsLed.style.background = "lime";

    let savedUser = localStorage.getItem("alex_user");

    // 🔥 SANITIZE STORED USER
    if(savedUser){
        savedUser = savedUser.trim().toLowerCase();

        const invalid = ["", "undefined", "null", "none"];

        if(!invalid.includes(savedUser) && savedUser.length > 1){
            console.log("👤 Restoring user:", savedUser);

            logDebug(`Restoring user: ${savedUser}`);

            ws.send(JSON.stringify({
                user_name: savedUser
            }));
        } else {
            console.log("⚠️ Invalid stored user, clearing");
            logDebug("Invalid stored user, clearing");
            localStorage.removeItem("alex_user");
        }
    }
};

ws.onclose = () => wsLed.style.background = "red";

ws.onmessage = (e)=>{

    const data = e.data;

    if(data.startsWith("__DEBUG__")){
        logDebug(data.replace("__DEBUG__", ""));
        return;
    }

    activityLed.style.background = "lime";
    setTimeout(()=> activityLed.style.background = "#555", 150);

    if(typeof data === "string" && data.startsWith("__AUDIO__")){
        const level = parseFloat(data.replace("__AUDIO__", ""));
        mouthOpen = Math.min(25, level * 120);

        if(level > 0.01){
            ignoreUntil = Date.now() + 500;
        }

        return;
    }

    if(typeof data === "string" && data.startsWith("__PROFILE__")){
        const json = JSON.parse(data.replace("__PROFILE__", ""));
        let html = "";

        // 🔥 highlight role first
        if(json.role){
            const role = json.role.toUpperCase();

            let color =
                role === "CREATOR" ? "#ff4444" :
                role === "ADMIN" ? "#ffaa00" :
                "#00ccff";

            html += `<div style="font-weight:bold; color:${color}; margin-bottom:5px;">
                        ROLE: ${role}
                    </div>`;
        }

        // 🔥 render remaining fields
        for(const k in json){
            if(k === "role") continue;

            html += `<div><b>${k.replaceAll("_"," ")}:</b> ${json[k]}</div>`;
        }

        profileContent.innerHTML = html || "No profile loaded";

        if(json.user_name){
            localStorage.setItem("alex_user", json.user_name);
        }

        return;
    }

    if(data === "__START__"){
        currentMsg = "";

        if(latest.firstChild){
            historyContent.prepend(latest.firstChild);
        }

        currentDiv = document.createElement("div");
        currentDiv.className = "msg bot";
        latest.innerHTML = "";
        latest.appendChild(currentDiv);

        return;
    }

    if(data === "__END__"){
        currentDiv = null;
        return;
    }

    if(typeof data === "string"){

        if(!currentDiv){
            const div = document.createElement("div");
            div.className = "msg bot";

            if(latest.firstChild){
                historyContent.prepend(latest.firstChild);
            }

            div.textContent = data;
            latest.innerHTML = "";
            latest.appendChild(div);
            return;
        }

        currentMsg += data;
        currentDiv.textContent = currentMsg;
    }
};

function send() {
    const input = document.getElementById("input");

    if (!input) return;

    const text = input.value.trim();
    if (!text) return;

    console.log("📤 Sending:", text);

    ws.send(text);

    // show user message in chat
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = text;

    if (latest.firstChild) {
        historyContent.prepend(latest.firstChild);
    }

    latest.innerHTML = "";
    latest.appendChild(div);

    input.value = "";
}

document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

function createRecorder(){

    recorder = new MediaRecorder(stream);
    chunks = [];

    recorder.ondataavailable = e=>{
        if(e.data && e.data.size > 0){
            chunks.push(e.data);
        }
    };

    recorder.onstop = async ()=>{
        stopping = false;

        if(!chunks.length){
            restartRecorder();
            return;
        }

        const blob = new Blob(chunks,{type:"audio/webm"});
        chunks = [];

        if(blob.size < 2000){
            ignoreUntil = Date.now() + 800;
            restartRecorder();
            return;
        }

        if(ws.readyState !== 1){
            return;
        }

        const buf = await blob.arrayBuffer();
        ws.send(buf);
        ws.send("__END_AUDIO__");

        ignoreUntil = Date.now() + 1000;

        restartRecorder();
    };
}

function restartRecorder(){
    if(!listening) return;

    setTimeout(()=>{
        createRecorder();
        recorder.start(250);
    },150);
}

async function startListening(){
    stream = await navigator.mediaDevices.getUserMedia({audio:true});

    createRecorder();
    recorder.start(250);

    listening = true;
    autoLed.style.background = "lime";
    detect(stream);
}

function stopListening(){
    listening=false;
    autoLed.style.background = "red";
    try{ recorder.stop(); }catch{}
    if(stream) stream.getTracks().forEach(t=>t.stop());
}

function toggleAutoListen(){
    if(listening){
        stopListening();
        autoBtn.innerText = "🎧 Auto Listen OFF";
    } else {
        startListening();
        autoBtn.innerText = "🎧 Auto Listen ON";
    }
}

function detect(stream){

    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    src.connect(analyser);

    const data = new Uint8Array(analyser.fftSize);

    let speaking=false;
    let lastSound=0;
    let start=0;

    function loop(){

        if(!listening) return;

        const now = Date.now();

        if(now < ignoreUntil){
            requestAnimationFrame(loop);
            return;
        }

        analyser.getByteTimeDomainData(data);

        let vol=0;
        for(let i=0;i<data.length;i++){
            vol+=Math.abs(data[i]-128);
        }
        vol/=data.length;

        /* ✅ MIC VISUAL UPDATE */
        const percent = Math.min(100, vol * 5);
        micLevel.style.width = percent + "%";
        micLevel.style.background = vol > SPEECH_THRESHOLD ? "lime" : "#777";

        if(vol > SPEECH_THRESHOLD){
            if(!speaking){
                speaking=true;
                start=now;

                // 🎙️ Barge-in: the moment the user starts talking, tell her
                // to stop immediately rather than waiting for this utterance
                // to finish recording — lets her be cut off mid-sentence.
                if(ws && ws.readyState === 1){
                    ws.send("__INTERRUPT__");
                }
            }
            lastSound=now;
        }

        if(speaking){
            const silenceComplete = now - lastSound > SILENCE_MS && now - start > MIN_SPEECH_MS;
            const tooLong = now - start > MAX_UTTERANCE_MS;

            if(silenceComplete || tooLong){

                if(!stopping){
                    stopping = true;

                    try{
                        recorder.requestData();
                        recorder.stop();
                    }catch{
                        stopping = false;
                    }
                }

                speaking=false;
            }
        }

        requestAnimationFrame(loop);
    }

    loop();
}

// AVATAR (unchanged)
const canvas = document.getElementById("avatarCanvas");
const ctx = canvas.getContext("2d");

let mouthOpen = 2;
let eyesOpen = true;

function draw(){
    ctx.clearRect(0,0,300,300);

    ctx.fillStyle="#ffcc99";
    ctx.beginPath();
    ctx.arc(150,150,80,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#000";
    const eyeSize = eyesOpen ? 10 : 2;

    ctx.beginPath();
    ctx.arc(120,130,eyeSize,0,Math.PI*2);
    ctx.arc(180,130,eyeSize,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="#000";
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.arc(150,180,mouthOpen,0,Math.PI);
    ctx.stroke();

    requestAnimationFrame(draw);
}

setInterval(()=>{ eyesOpen = !eyesOpen }, 3000);
draw();

function logoff(){

    console.log("🚪 Logging off...");

    // 🔴 stop listening (mic)
    stopListening();

    // 🔴 close websocket
    if(ws && ws.readyState === 1){
        ws.close();
    }

    // 🔴 clear stored identity
    localStorage.removeItem("alex_user");

    // 🔴 reset UI
    latest.innerHTML = "";
    historyContent.innerHTML = "";
    profileContent.innerHTML = "No profile loaded";

    // 🔴 reconnect fresh after short delay
    setTimeout(()=>{
        location.reload();
    }, 300);
}

</script>



</body>
</html>
